<svg xmlns="http://www.w3.org/2000/svg" width="2300" height="1260" viewBox="0 0 2300 1260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset=".55" stop-color="#f5f7fb"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0a2540" flood-opacity=".14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0a2540" flood-opacity=".10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0a84ff"/>
    </marker>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#00a693"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#ff9f0a"/>
    </marker>
    <marker id="arrowViolet" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue","PingFang TC","Noto Sans TC",Arial,sans-serif}
      .title{font-size:58px;font-weight:700;letter-spacing:0;fill:#111827}
      .subtitle{font-size:24px;font-weight:500;fill:#667085}
      .axisLabel{font-size:23px;font-weight:700;letter-spacing:0;fill:#111827}
      .axisHint{font-size:17px;font-weight:500;fill:#667085}
      .cardTitle{font-size:27px;font-weight:700;fill:#111827}
      .cardSub{font-size:18px;font-weight:500;fill:#667085}
      .small{font-size:18px;font-weight:600;fill:#111827}
      .mini{font-size:15px;font-weight:600;fill:#667085}
      .timeCard{fill:#ffffff;stroke:#d7dee8;stroke-width:1.5;filter:url(#softShadow)}
      .noteCard{fill:#ffffff;stroke:#d7dee8;stroke-width:1.5;filter:url(#softShadow)}
      .skillCard{fill:#ffffff;stroke:#d7dee8;stroke-width:1.5;filter:url(#softShadow)}
      .agentCard{fill:#ffffff;stroke:#d7dee8;stroke-width:1.5;filter:url(#shadow)}
      .axisBlue{stroke:#0a84ff;stroke-width:5;stroke-linecap:round;fill:none}
      .axisTeal{stroke:#00a693;stroke-width:5;stroke-linecap:round;fill:none}
      .axisOrange{stroke:#ff9f0a;stroke-width:5;stroke-linecap:round;fill:none}
      .axisViolet{stroke:#7c3aed;stroke-width:5;stroke-linecap:round;fill:none}
      .gridLine{stroke:#101828;stroke-width:2}
    </style>
  </defs>

  <rect width="2300" height="1260" fill="url(#bg)"/>
  <circle cx="300" cy="170" r="220" fill="#0a84ff" opacity=".045"/>
  <circle cx="1780" cy="1040" r="280" fill="#ff9f0a" opacity=".045"/>
  <circle cx="1600" cy="180" r="190" fill="#00a693" opacity=".05"/>

  <text x="92" y="110" class="sans title">Hermes HyperCard Loop</text>
  <text x="96" y="150" class="sans subtitle">四軸系統圖：時間管理、卡片盒、Skill tree、Agent</text>

  <!-- Axis lines -->
  <line x1="860" y1="940" x2="860" y2="250" class="axisBlue" marker-end="url(#arrowBlue)"/>
  <line x1="250" y1="620" x2="1900" y2="620" class="axisTeal" marker-end="url(#arrowTeal)"/>
  <line x1="1160" y1="750" x2="2200" y2="1180" class="axisOrange" marker-end="url(#arrowOrange)"/>
  <path d="M1108 378 C1320 250 1560 185 1810 168" class="axisViolet" marker-end="url(#arrowViolet)"/>

  <!-- Axis labels -->
  <g class="sans">
    <rect x="740" y="186" width="240" height="44" rx="22" fill="#e7f1ff"/>
    <text x="792" y="215" class="axisLabel">時間管理軸</text>
    <text x="1005" y="215" class="axisHint">由時段向上展開</text>

    <rect x="260" y="535" width="214" height="44" rx="22" fill="#e2f8f3"/>
    <text x="300" y="564" class="axisLabel">卡片盒軸</text>
    <text x="500" y="564" class="axisHint">從此到用</text>

    <rect x="1505" y="705" width="190" height="44" rx="22" fill="#fff3dc"/>
    <text x="1547" y="734" class="axisLabel">Skill 軸</text>
    <text x="1715" y="734" class="axisHint">45 度斜向裝配</text>

    <rect x="1595" y="105" width="190" height="44" rx="22" fill="#f1eafe"/>
    <text x="1638" y="134" class="axisLabel">Agent 軸</text>
  </g>

  <!-- Central card -->
  <g transform="translate(700 475)" filter="url(#shadow)">
    <rect width="320" height="292" rx="30" fill="url(#center)" stroke="#d7dee8" stroke-width="2"/>
    <rect x="0" y="0" width="320" height="58" rx="30" fill="#111827"/>
    <path d="M0 30 Q0 0 30 0 H290 Q320 0 320 30 V58 H0 Z" fill="#111827"/>
    <text x="28" y="38" class="sans small" fill="#ffffff">交叉點卡片</text>
    <text x="210" y="38" class="sans mini" fill="#cbd5e1">HyperCard</text>
    <g transform="translate(67 86)">
      <rect x="0" y="0" width="186" height="156" rx="4" fill="#ffffff" stroke="#101828" stroke-width="2.5"/>
      <line x1="62" y1="0" x2="62" y2="156" class="gridLine"/>
      <line x1="124" y1="0" x2="124" y2="156" class="gridLine"/>
      <line x1="0" y1="52" x2="186" y2="52" class="gridLine"/>
      <line x1="0" y1="104" x2="186" y2="104" class="gridLine"/>
      <text x="25" y="34" class="sans small" fill="#0a84ff">卡</text>
      <text x="87" y="34" class="sans small" fill="#0a84ff">時</text>
      <text x="149" y="34" class="sans small" fill="#0a84ff">技</text>
      <text x="25" y="86" class="sans small" fill="#00a693">日</text>
      <text x="65" y="86" class="sans small" fill="#111827">Hermes</text>
      <text x="149" y="86" class="sans small" fill="#00a693">週</text>
      <text x="25" y="138" class="sans small" fill="#ff9f0a">年</text>
      <text x="87" y="138" class="sans small" fill="#ff9f0a">盒</text>
      <text x="149" y="138" class="sans small" fill="#ff9f0a">網</text>
    </g>
  </g>

  <!-- Time cards -->
  <g class="sans">
    <rect x="650" y="250" width="420" height="72" rx="18" class="timeCard"/>
    <text x="748" y="295" class="cardTitle">① 百年人生計劃</text>
    <rect x="650" y="345" width="420" height="72" rx="18" class="timeCard"/>
    <text x="748" y="390" class="cardTitle">② 人生年計劃</text>
    <rect x="650" y="800" width="420" height="72" rx="18" class="timeCard"/>
    <text x="730" y="845" class="cardTitle">③ 年度工作計劃</text>
    <rect x="650" y="895" width="420" height="72" rx="18" class="timeCard"/>
    <text x="776" y="940" class="cardTitle">④ 週計劃</text>
    <rect x="650" y="990" width="420" height="72" rx="18" class="timeCard"/>
    <text x="776" y="1035" class="cardTitle">⑤ 日計劃</text>
    <rect x="650" y="1085" width="420" height="72" rx="18" class="timeCard"/>
    <text x="762" y="1130" class="cardTitle">⑥ 時段計劃</text>
  </g>

  <!-- Note cards axis -->
  <g class="sans">
    <rect x="100" y="575" width="130" height="90" rx="18" class="noteCard"/>
    <text x="127" y="628" class="small">臨時筆記</text>
    <rect x="285" y="575" width="130" height="90" rx="18" class="noteCard"/>
    <text x="312" y="628" class="small">卡片筆記</text>
    <rect x="470" y="575" width="130" height="90" rx="18" class="noteCard"/>
    <text x="497" y="628" class="small">永久筆記</text>
    <rect x="1215" y="575" width="130" height="90" rx="18" class="noteCard"/>
    <text x="1242" y="628" class="small">專案筆記</text>
    <rect x="1435" y="575" width="145" height="90" rx="18" class="noteCard"/>
    <text x="1451" y="628" class="small">文獻卡片盒</text>
    <rect x="1660" y="575" width="145" height="90" rx="18" class="noteCard"/>
    <text x="1676" y="628" class="small">永久卡片盒</text>
  </g>

  <!-- Skill cards on diagonal, readable and aligned to a 45-degree path -->
  <g class="sans">
    <rect x="1250" y="705" width="235" height="88" rx="20" class="skillCard"/>
    <text x="1280" y="743" class="small">Skill tree管理員</text>
    <text x="1280" y="771" class="mini">找出自己的 Skills</text>

    <rect x="1470" y="815" width="235" height="88" rx="20" class="skillCard"/>
    <text x="1528" y="853" class="small">基本技能</text>
    <text x="1495" y="881" class="mini">Diddlebug / HyperCard</text>

    <rect x="1690" y="925" width="235" height="88" rx="20" class="skillCard"/>
    <text x="1778" y="963" class="small">九宮</text>
    <text x="1722" y="991" class="mini">iMandalart / Markdown</text>

    <rect x="1910" y="1035" width="235" height="88" rx="20" class="skillCard"/>
    <text x="1998" y="1073" class="small">大綱</text>
    <text x="1975" y="1101" class="mini">Bonsai / Bike</text>

    <rect x="1545" y="1088" width="265" height="88" rx="20" class="skillCard"/>
    <text x="1590" y="1126" class="small">網站 Function</text>
    <text x="1575" y="1154" class="mini">PDF / 文字 / PPT 變網站</text>
  </g>

  <!-- Agent axis: Mac + phone -->
  <g transform="translate(1650 220)" class="sans">
    <rect x="0" y="0" width="330" height="235" rx="28" class="agentCard"/>
    <text x="28" y="42" class="cardTitle">Hermes Agent</text>
    <text x="28" y="72" class="cardSub">Macintosh + 手機</text>

    <g transform="translate(42 92)">
      <rect x="0" y="0" width="132" height="116" rx="16" fill="#d8d6ce" stroke="#7a7a7a" stroke-width="4"/>
      <rect x="18" y="18" width="96" height="70" fill="#111827" rx="2"/>
      <rect x="29" y="27" width="74" height="52" fill="#fffef9"/>
      <rect x="38" y="35" width="56" height="34" fill="#ffffff" stroke="#111827" stroke-width="1.5"/>
      <line x1="56" y1="35" x2="56" y2="69" stroke="#111827" stroke-width="1.5"/>
      <line x1="75" y1="35" x2="75" y2="69" stroke="#111827" stroke-width="1.5"/>
      <line x1="38" y1="46" x2="94" y2="46" stroke="#111827" stroke-width="1.5"/>
      <line x1="38" y1="58" x2="94" y2="58" stroke="#111827" stroke-width="1.5"/>
      <rect x="47" y="95" width="38" height="7" rx="2" fill="#858585"/>
    </g>

    <g transform="translate(214 88)">
      <rect x="0" y="0" width="62" height="126" rx="13" fill="#111827"/>
      <rect x="8" y="13" width="46" height="98" rx="3" fill="#f8fbff" stroke="#8da2c0"/>
      <line x1="23" y1="13" x2="23" y2="111" stroke="#111827" stroke-width="1.5"/>
      <line x1="39" y1="13" x2="39" y2="111" stroke="#111827" stroke-width="1.5"/>
      <line x1="8" y1="38" x2="54" y2="38" stroke="#111827" stroke-width="1.5"/>
      <line x1="8" y1="64" x2="54" y2="64" stroke="#111827" stroke-width="1.5"/>
      <line x1="8" y1="90" x2="54" y2="90" stroke="#111827" stroke-width="1.5"/>
    </g>
    <path d="M174 152 C196 145 204 147 214 160" stroke="#ff453a" stroke-width="5" fill="none" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
    <text x="226" y="66" class="mini">Hello, world.</text>
  </g>

  <!-- Bottom caption -->
  <g class="sans">
    <rect x="92" y="1110" width="500" height="74" rx="24" fill="#ffffff" stroke="#d7dee8" filter="url(#softShadow)"/>
    <circle cx="132" cy="1147" r="12" fill="#0a84ff"/>
    <circle cx="164" cy="1147" r="12" fill="#00a693"/>
    <circle cx="196" cy="1147" r="12" fill="#ff9f0a"/>
    <circle cx="228" cy="1147" r="12" fill="#7c3aed"/>
    <text x="260" y="1155" class="small">四軸交叉後，每一張卡片都可以成為可執行的 Hermes Skill。</text>
  </g>
</svg>
